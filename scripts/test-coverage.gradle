import groovy.xml.XmlParser

tasks.register("testWithCoverage") {
  group = "verification"
  description = "Strict line-based coverage report matching SonarQube scoring."

  dependsOn tasks.named("test"), tasks.named("jacocoTestReport")

  doLast {
    def green  = "\u001B[32m"
    def red    = "\u001B[31m"
    def reset  = "\u001B[0m"
    def gray   = "\u001B[90m"
    def white  = "\u001B[38;5;253m"
    def yellow = "\u001B[33m"
    def orange = "\u001B[38;5;208m"

    def changedClassesMap = [:]

    try {
      def getChangedLines = { ref ->
        def cmd = ["bash", "-lc", "git fetch origin ${ref}:${ref} --depth=1 >/dev/null 2>&1 || true && git rev-parse --verify ${ref} >/dev/null 2>&1 && git diff -U0 ${ref}...HEAD || true"]
        def proc = cmd.execute(null, project.rootDir)
        proc.waitFor()
        def diffText = proc.in.text?.trim() ?: ""

        def diffMap = [:]
        def currentFile = null

        diffText.eachLine { line ->
          if (line.startsWith("+++ b/")) {
            def path = line.substring(6)
            if (path.endsWith(".java")) {
              currentFile = new File(path).getName().replaceAll(/\.java$/, "")
              diffMap[currentFile] = [] as Set
            } else {
              currentFile = null
            }
          } else if (currentFile != null && line.startsWith("@@ ")) {
            def matcher = (line =~ /@@ \-\d+(?:,\d+)? \+(\d+)(?:,(\d+))? @@/)
            if (matcher.find()) {
              int startLine = matcher.group(1).toInteger()
              int count = matcher.group(2) != null ? matcher.group(2).toInteger() : 1
              for (int i = 0; i < count; i++) {
                diffMap[currentFile] << (startLine + i)
              }
            }
          }
        }
        return diffMap
      }

      changedClassesMap = getChangedLines("origin/master")
      if (changedClassesMap.isEmpty()) changedClassesMap = getChangedLines("origin/main")

    } catch (Exception e) {
      logger.lifecycle("Warning: could not compute git diff: ${e.message}")
    }

    def checkAll = changedClassesMap.isEmpty()
    def reportFile = layout.buildDirectory.file("reports/jacoco/test/jacocoTestReport.xml").get().asFile

    int grandTotalLinesToCover = 0
    int grandCoveredLines = 0
    int grandTotalConditions = 0
    int grandCoveredConditions = 0

    if (reportFile.exists()) {
      def parser = new XmlParser(false, false)
      parser.setFeature("http://apache.org/xml/features/disallow-doctype-decl", false)
      parser.setFeature("http://apache.org/xml/features/nonvalidating/load-external-dtd", false)

      def report = parser.parse(reportFile)

      report.'package'.each { pkg ->
        def pkgPath = pkg.attribute('name').replace('.', '/')

        pkg.'sourcefile'.each { sourceFile ->
          def fileName = sourceFile.attribute('name') ?: ""
          def className = fileName.replace(".java", "")

          boolean isTargeted = changedClassesMap.containsKey(className)

          if (checkAll || isTargeted) {
            def changedLineNumbers = isTargeted ? changedClassesMap[className] : ([] as Set)

            int fileTotalLines = 0, fileCoveredLines = 0
            int fileTotalConditions = 0, fileCoveredConditions = 0
            def missedLineDetails = []

            def relativePath = "src/main/java/${pkgPath}/${fileName}"
            def javaFile = project.file(relativePath)
            def linesContent = javaFile.exists() ? javaFile.readLines() : []

            def sourceLines = sourceFile.'line'
            if (sourceLines != null && !sourceLines.isEmpty()) {
              def linesToProcess = checkAll ? sourceLines.collect { it.attribute('nr')?.toString() } : changedLineNumbers.collect { it.toString() }

              linesToProcess.each { lineStr ->
                // Safe line element lookup with fallback handling
                def lineNode = sourceLines.find { it.attribute('nr') == lineStr }

                if (lineNode) {
                  int lineNum = lineStr.toInteger()
                  def lineText = (lineNum > 0 && lineNum <= linesContent.size()) ? linesContent[lineNum - 1] : ""
                  def trimmed = lineText.trim()

                  int mi = (lineNode.attribute('mi')?.toString() ?: "0").toInteger()
                  int ci = (lineNode.attribute('ci')?.toString() ?: "0").toInteger()
                  int mb = (lineNode.attribute('mb')?.toString() ?: "0").toInteger()
                  int cb = (lineNode.attribute('cb')?.toString() ?: "0").toInteger()

                  boolean isExecutable = (mi > 0 || ci > 0)

                  if (isExecutable) {
                    boolean isSonarExecutable = true

                    if (trimmed.isEmpty() ||
                      trimmed.startsWith("//") ||
                      trimmed.startsWith("/*") ||
                      trimmed.startsWith("*") ||
                      trimmed.startsWith("@") ||
                      trimmed.startsWith("package ") ||
                      trimmed.startsWith("import ") ||
                      trimmed.contains("class ") ||
                      trimmed.contains("interface ") ||
                      trimmed.contains("enum ")) {
                      isSonarExecutable = false
                    } else {
                      def structuralClean = trimmed.replaceAll(/[\{\}\(\);]/, "").replaceAll(/\b(else|try|finally)\b/, "").trim()
                      if (structuralClean.isEmpty()) {
                        isSonarExecutable = false
                      }
                      else if (trimmed.endsWith(",")) {
                        isSonarExecutable = false
                      }
                    }

                    if (isSonarExecutable) {
                      boolean isContinuation = trimmed.startsWith("&&") || trimmed.startsWith("||")

                      if (isContinuation && mb > 0) {
                        ci = 0
                      }

                      fileTotalLines++
                      if (ci > 0) fileCoveredLines++

                      int lineTotalConditions = mb + cb
                      int lineCoveredConditions = cb

                      if (mb == 0 && lineTotalConditions == 2 && !trimmed.startsWith("if") && !trimmed.contains("?")) {
                        lineTotalConditions = 0
                        lineCoveredConditions = 0
                      }

                      if (ci == 0 && (trimmed.contains("&&") || trimmed.contains("||"))) {
                        lineTotalConditions = 2
                        lineCoveredConditions = 0
                        // Re-align missed branch totals if it's completely unexecuted text logic
                        if (mb == 0) mb = 2
                      }

                      fileTotalConditions += lineTotalConditions
                      fileCoveredConditions += lineCoveredConditions

                      if ((ci == 0 && mi > 0) || (mb > 0)) {
                        missedLineDetails << [lineNum: lineNum, mb: mb, ci: ci, mi: mi]
                      }
                    }
                  }
                }
              }
            }

            grandTotalLinesToCover += fileTotalLines
            grandCoveredLines += fileCoveredLines
            grandTotalConditions += fileTotalConditions
            grandCoveredConditions += fileCoveredConditions

            if (!checkAll && isTargeted && fileTotalLines > 0) {
              double fileTotalUnits = fileTotalLines + fileTotalConditions
              double filePct = fileTotalUnits > 0 ? ((fileCoveredLines + fileCoveredConditions) / fileTotalUnits) * 100 : 100.0
              def color = filePct >= 80 ? green : red

              logger.lifecycle("\n" + "━" * 85)
              logger.lifecycle(" 🎯 TARGET REPORT: ${fileName} (New Code Only)")
              logger.lifecycle(" 📈 Score: ${color}${String.format("%.2f", filePct)}%${reset} | Threshold: 80%")
              logger.lifecycle("━" * 85)

              logger.lifecycle(String.format(" %-20s | %-12s | %-12s | %-10s", "METRIC", "TOTAL", "COVERED", "SCORE"))
              logger.lifecycle("─" * 85)

              def linePct = fileTotalLines > 0 ? (fileCoveredLines / (double)fileTotalLines * 100) : 100.0
              def condPct = fileTotalConditions > 0 ? (fileCoveredConditions / (double)fileTotalConditions * 100) : 100.0

              logger.lifecycle(String.format(" %-20s | %-12s | %-12s | %.2f%%", "Lines", fileTotalLines, fileCoveredLines, linePct))
              logger.lifecycle(String.format(" %-20s | %-12s | %-12s | %s", "Conditions", fileTotalConditions, fileCoveredConditions, fileTotalConditions > 0 ? String.format("%.2f%%", condPct) : "N/A"))
              logger.lifecycle("━" * 85)

              if (!missedLineDetails.isEmpty()) {
                missedLineDetails.unique { it.lineNum }.sort { it.lineNum }.each { gap ->
                  def code = (gap.lineNum > 0 && gap.lineNum <= linesContent.size()) ? linesContent[gap.lineNum - 1].trim() : "---"

                  // 🛠️ FIXED OUTPUT LOOP: Process execution gap and missed branch independently
                  if (gap.ci == 0 && gap.mi > 0) {
                    logger.lifecycle(" ${orange}💡 Execution Gap (Line completely missed):${reset}")
                    logger.lifecycle(String.format("   %-65s", "${relativePath}:${gap.lineNum}"))
                  }

                  if (gap.mb > 0) {
                    logger.lifecycle(" ${yellow}⚠️  Partial Condition (Branch missed):${reset}")
                    logger.lifecycle(String.format("   %-65s ${gray}(Missed Branches: %s)${reset}", "${relativePath}:${gap.lineNum}", gap.mb))
                  }

                  logger.lifecycle("   ${white}└─ Code: ${code}${reset}")
                }
                logger.lifecycle("─" * 85)
              } else {
                logger.lifecycle(" ${green}✨ No gaps found in new code!${reset}")
                logger.lifecycle("━" * 85)
              }
            }
          }
        }
      }

      double grandTotalUnits = grandTotalLinesToCover + grandTotalConditions
      double grandPct = grandTotalUnits > 0 ? ((grandCoveredLines + grandCoveredConditions) / grandTotalUnits) * 100 : 100.0
      def grandColor = grandPct >= 80 ? green : red
      def statusLabel = grandPct >= 80 ? "${green}✅ PASS${reset}" : "${red}❌ FAIL${reset}"

      logger.lifecycle("\n" + "━" * 85)
      def title = checkAll ? "🏁 TOTAL PROJECT COVERAGE" : "🏁 NEW CODE SCORE (Only Changed Lines for this PR)"
      logger.lifecycle(" ${title}")
      logger.lifecycle("${white} 📊 Score: ${grandColor}${String.format("%.2f", grandPct)}%${reset}${white} | Threshold: 80% | Status: ${statusLabel}${reset}")
      logger.lifecycle("━" * 85 + "\n")

      if (grandPct < 80) {
        throw new GradleException("Coverage is below 80% threshold!")
      }
    }
  }
}
